const Ventas = {
  _carrito: [],
  _clienteId: null,

  render() {
    const ventas = Storage.getVentas().sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
    const totalVentas  = ventas.reduce((s, v) => s + parseFloat(v.total || 0), 0);
    const totalCobrado = ventas.reduce((s, v) => s + parseFloat(v.pagadoInicial || 0), 0)
      + Storage.getAbonos().reduce((s, a) => s + parseFloat(a.monto || 0), 0);
    const totalPendiente = ventas.reduce((s, v) => s + Storage.getSaldoVenta(v.id), 0);

    document.getElementById('view-container').innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">🛒 Pedidos Clientes</h1>
          <p class="page-subtitle">${ventas.length} pedidos de clientes</p>
        </div>
        <button class="btn btn-primary" onclick="Ventas.openCarrito()">+ Nuevo Pedido Cliente</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Pedidos</div>
          <div class="stat-value" style="font-size:18px">${Storage.fmt(totalVentas)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cobrado</div>
          <div class="stat-value" style="font-size:18px;color:var(--success)">${Storage.fmt(totalCobrado)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pendiente</div>
          <div class="stat-value" style="font-size:18px;color:var(--danger)">${Storage.fmt(totalPendiente)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Nro. Pedidos</div>
          <div class="stat-value">${ventas.length}</div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <input type="text" class="search-input" id="vta-q" placeholder="Buscar cliente, fecha..." oninput="Ventas.filter()">
          <select class="form-control" style="width:auto" id="vta-est" onchange="Ventas.filter()">
            <option value="">Todos los estados</option>
            <option>pagado</option><option>parcial</option><option>pendiente</option>
          </select>
        </div>
        <div id="vta-body">${this._table(ventas)}</div>
      </div>`;
  },

  _table(ventas) {
    if (!ventas.length) return `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3>Sin pedidos de clientes</h3>
        <p>Crea tu primer pedido cliente con el botón de arriba</p>
      </div>`;

    return `<div class="table-wrapper"><table>
      <thead><tr>
        <th>Fecha</th><th>Cliente</th><th>Productos</th>
        <th>Total</th><th>Pagado Inicial</th><th>Saldo</th><th>Estado</th><th></th>
      </tr></thead>
      <tbody>
        ${ventas.map(v => {
          const saldo = Storage.getSaldoVenta(v.id);
          const estado = saldo <= 0 ? 'pagado' : parseFloat(v.pagadoInicial || 0) > 0 ? 'parcial' : 'pendiente';
          return `
            <tr>
              <td>${Storage.fmtDate(v.fecha)}</td>
              <td>
                <div style="font-weight:600">${v.clienteNombre || '-'}</div>
              </td>
              <td style="font-size:12px;color:var(--text-secondary)">
                ${(v.items||[]).map(i => `${i.nombre} x${i.cantidad}`).join(', ').substr(0, 60)}
                ${((v.items||[]).map(i => `${i.nombre} x${i.cantidad}`).join(', ')).length > 60 ? '...' : ''}
              </td>
              <td><strong>${Storage.fmt(v.total)}</strong></td>
              <td>${Storage.fmt(v.pagadoInicial)}</td>
              <td style="color:${saldo>0?'var(--danger)':'var(--success)'};font-weight:700">${Storage.fmt(saldo)}</td>
              <td>${this._badge(estado)}</td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm" onclick="Ventas.verDetalle('${v.id}')">👁️</button>
                  ${saldo > 0 ? `<button class="btn btn-success btn-sm" onclick="Ventas.openAbono('${v.id}')">💵 Abonar</button>` : ''}
                </div>
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  },

  _badge(e) {
    const m = { pagado:'success', parcial:'warning', pendiente:'danger' };
    return `<span class="badge badge-${m[e]||'secondary'}">${e}</span>`;
  },

  filter() {
    const q   = (document.getElementById('vta-q')?.value || '').toLowerCase();
    const est = document.getElementById('vta-est')?.value || '';
    let ventas = Storage.getVentas().sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    if (q) ventas = ventas.filter(v => `${v.clienteNombre}${v.fecha}`.toLowerCase().includes(q));
    if (est) ventas = ventas.filter(v => {
      const s = Storage.getSaldoVenta(v.id);
      const estado = s<=0?'pagado':parseFloat(v.pagadoInicial||0)>0?'parcial':'pendiente';
      return estado === est;
    });
    document.getElementById('vta-body').innerHTML = this._table(ventas);
  },

  // ── Carrito ──
  openCarrito(clienteIdPre) {
    this._carrito = [];
    this._clienteId = clienteIdPre || null;
    const clientes = Storage.getClientes().sort((a,b)=>a.nombre.localeCompare(b.nombre));
    const productos = Storage.getProductos().filter(p => (p.stock||0) > 0);

    App.openModal('🛒 Nuevo Pedido Cliente', `
      <div class="form-group">
        <label>Cliente *</label>
        <select class="form-control" id="cart-cli">
          <option value="">-- Seleccionar cliente --</option>
          ${clientes.map(c => `<option value="${c.id}" ${c.id===clienteIdPre?'selected':''}>${c.nombre}${Storage.getSaldoCliente(c.id)>0?' (tiene saldo pendiente)':''}</option>`).join('')}
        </select>
      </div>

      <div class="form-group">
        <label>Agregar Producto</label>
        <div style="display:flex;gap:8px">
          <select class="form-control" id="cart-prod" style="flex:1">
            <option value="">-- Seleccionar producto --</option>
            ${productos.map(p => `<option value="${p.id}">${p.nombre} — ${Storage.fmt(p.precioVenta)} (stock: ${p.stock})</option>`).join('')}
          </select>
          <button class="btn btn-outline btn-sm" onclick="Ventas._agregarItem()" style="white-space:nowrap">+ Agregar</button>
        </div>
      </div>

      <div style="margin-bottom:6px;font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em">Productos en el carrito</div>
      <div id="cart-items" style="min-height:60px;margin-bottom:14px">
        <p style="color:var(--text-secondary);font-size:13px;padding:10px 0">Agrega productos al carrito</p>
      </div>
      <div style="text-align:right;font-size:18px;font-weight:700;color:var(--primary);margin-bottom:16px" id="cart-total">${Storage.fmt(0)}</div>

      <div class="form-row">
        <div class="form-group">
          <label>Pagado en este momento</label>
          <input class="form-control" id="cart-pagado" type="number" step="0.01" min="0" placeholder="0.00" value="0">
        </div>
        <div class="form-group">
          <label>Notas</label>
          <input class="form-control" id="cart-notas" placeholder="Observaciones...">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="Ventas.guardarVenta()">✅ Confirmar Pedido</button>
      </div>`, true);
  },

  _agregarItem() {
    const prodId = document.getElementById('cart-prod')?.value;
    if (!prodId) { App.toast('Selecciona un producto', 'warning'); return; }
    const prod = Storage.getProducto(prodId);
    if (!prod) return;
    const existing = this._carrito.find(i => i.productoId === prodId);
    if (existing) {
      if (existing.cantidad >= (prod.stock || 0)) { App.toast('Sin stock suficiente', 'warning'); return; }
      existing.cantidad++;
    } else {
      this._carrito.push({ productoId: prodId, nombre: prod.nombre, precioUnitario: prod.precioVenta, cantidad: 1, stockMax: prod.stock || 0 });
    }
    this._renderCarritoItems();
  },

  _renderCarritoItems() {
    const el = document.getElementById('cart-items');
    const tot = document.getElementById('cart-total');
    if (!el) return;
    if (!this._carrito.length) {
      el.innerHTML = `<p style="color:var(--text-secondary);font-size:13px;padding:10px 0">Agrega productos al carrito</p>`;
      if (tot) tot.textContent = Storage.fmt(0);
      return;
    }
    const total = this._carrito.reduce((s, i) => s + i.precioUnitario * i.cantidad, 0);
    el.innerHTML = this._carrito.map((item, idx) => `
      <div class="cart-item">
        ${item.foto ? `<img src="${item.foto}" class="product-thumb" alt="">` : '<div class="product-thumb">📦</div>'}
        <div class="cart-item-info">
          <div class="cart-item-name">${item.nombre}</div>
          <div class="cart-item-price">${Storage.fmt(item.precioUnitario)} c/u</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="qty-btn" onclick="Ventas._cambiarCant(${idx},-1)">−</button>
          <span style="min-width:24px;text-align:center;font-weight:700">${item.cantidad}</span>
          <button class="qty-btn" onclick="Ventas._cambiarCant(${idx},1)">+</button>
          <span style="margin-left:6px;min-width:70px;text-align:right;font-weight:700">${Storage.fmt(item.precioUnitario * item.cantidad)}</span>
          <button class="btn btn-ghost btn-sm" onclick="Ventas._quitarItem(${idx})" style="padding:4px 6px">✕</button>
        </div>
      </div>`).join('');
    if (tot) tot.textContent = Storage.fmt(total);
  },

  _cambiarCant(idx, delta) {
    const item = this._carrito[idx];
    if (!item) return;
    const nueva = item.cantidad + delta;
    if (nueva <= 0) { this._carrito.splice(idx, 1); }
    else if (nueva > item.stockMax) { App.toast('Sin stock suficiente', 'warning'); return; }
    else { item.cantidad = nueva; }
    this._renderCarritoItems();
  },

  _quitarItem(idx) { this._carrito.splice(idx, 1); this._renderCarritoItems(); },

  guardarVenta() {
    const clienteId = document.getElementById('cart-cli')?.value;
    if (!clienteId) { App.toast('Selecciona un cliente', 'error'); return; }
    if (!this._carrito.length) { App.toast('El carrito está vacío', 'error'); return; }
    const cliente  = Storage.getCliente(clienteId);
    const total    = this._carrito.reduce((s, i) => s + i.precioUnitario * i.cantidad, 0);
    const pagado   = parseFloat(document.getElementById('cart-pagado')?.value) || 0;
    const notas    = document.getElementById('cart-notas')?.value.trim() || '';

    // Descontar stock
    this._carrito.forEach(item => {
      const p = Storage.getProducto(item.productoId);
      if (p) {
        p.stock = Math.max(0, (p.stock || 0) - item.cantidad);
        if (p.stock === 0) p.estado = 'agotado';
        Storage.saveProducto(p);
      }
    });

    Storage.saveVenta({
      clienteId,
      clienteNombre: cliente?.nombre || '',
      items:         this._carrito.map(i => ({ productoId:i.productoId, nombre:i.nombre, cantidad:i.cantidad, precioUnitario:i.precioUnitario })),
      total,
      pagadoInicial: pagado,
      notas
    });

    this._carrito = [];
    App.closeModal();
    App.toast('Pedido registrado exitosamente', 'success');
    this.render();
  },

  // ── Abono ──
  openAbono(ventaId) {
    const v    = Storage.getVenta(ventaId);
    const saldo= Storage.getSaldoVenta(ventaId);
    const abonos = Storage.getAbonosByVenta(ventaId);

    App.openModal('💵 Registrar Abono', `
      <div style="background:#f8fafc;border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--text-secondary);font-size:13px">Total venta</span>
          <span style="font-weight:700">${Storage.fmt(v?.total)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--text-secondary);font-size:13px">Pagado inicial</span>
          <span>${Storage.fmt(v?.pagadoInicial)}</span>
        </div>
        ${abonos.map(a => `
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">
            <span style="color:var(--text-secondary)">Abono ${Storage.fmtDate(a.fecha)}</span>
            <span>${Storage.fmt(a.monto)}</span>
          </div>`).join('')}
        <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between">
          <span style="font-weight:700;color:var(--danger)">Saldo pendiente</span>
          <span style="font-weight:700;color:var(--danger);font-size:16px">${Storage.fmt(saldo)}</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Monto a abonar *</label>
          <input class="form-control" id="ab-monto" type="number" step="0.01" min="0.01" max="${saldo}" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input class="form-control" id="ab-fecha" type="date" value="${Storage.today()}">
        </div>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <input class="form-control" id="ab-notas" placeholder="Transferencia, efectivo...">
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>
        <button class="btn btn-success" onclick="Ventas.saveAbono('${ventaId}','${v?.clienteId}')">💾 Registrar Abono</button>
      </div>`);
  },

  saveAbono(ventaId, clienteId) {
    const monto = parseFloat(document.getElementById('ab-monto')?.value);
    if (!monto || monto <= 0) { App.toast('Ingresa un monto válido', 'error'); return; }
    const saldo = Storage.getSaldoVenta(ventaId);
    if (monto > saldo + 0.01) { App.toast(`El abono no puede superar el saldo (${Storage.fmt(saldo)})`, 'warning'); return; }

    Storage.saveAbono({
      ventaId,
      clienteId,
      monto,
      fecha: document.getElementById('ab-fecha')?.value || Storage.today(),
      notas: document.getElementById('ab-notas')?.value.trim() || ''
    });

    App.closeModal();
    App.toast('Abono registrado', 'success');
    this.render();
  },

  verDetalle(ventaId) {
    const v = Storage.getVenta(ventaId);
    if (!v) return;
    const abonos = Storage.getAbonosByVenta(ventaId);
    const saldo  = Storage.getSaldoVenta(ventaId);

    App.openModal(`Pedido Cliente — ${v.clienteNombre}`, `
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">📅 ${Storage.fmtDate(v.fecha)} · Cliente: ${v.clienteNombre}</div>
        ${(v.items||[]).map(i => `
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span>${i.nombre} × ${i.cantidad}</span>
            <strong>${Storage.fmt(i.precioUnitario * i.cantidad)}</strong>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:15px;font-weight:700">
          <span>Total</span><span>${Storage.fmt(v.total)}</span>
        </div>
      </div>

      <div style="background:#f8fafc;border-radius:8px;padding:12px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>Pagado inicial</span><span>${Storage.fmt(v.pagadoInicial)}</span>
        </div>
        ${abonos.map(a => `
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">
            <span style="color:var(--text-secondary)">Abono ${Storage.fmtDate(a.fecha)}${a.notas?' · '+a.notas:''}</span>
            <span>${Storage.fmt(a.monto)}</span>
          </div>`).join('')}
        <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700">
          <span style="color:${saldo>0?'var(--danger)':'var(--success)'}">Saldo pendiente</span>
          <span style="color:${saldo>0?'var(--danger)':'var(--success)'}">${Storage.fmt(saldo)}</span>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cerrar</button>
        ${saldo > 0 ? `<button class="btn btn-success" onclick="App.closeModal();Ventas.openAbono('${ventaId}')">💵 Abonar</button>` : ''}
      </div>`, true);
  }
};

        <div class="stat-card">
          <div class="stat-label">Cartera Total</div>
          <div class="stat-value" style="font-size:18px;color:var(--danger)">${Storage.fmt(totalCartera)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cobrado</div>
          <div class="stat-value" style="font-size:18px;color:var(--success)">${Storage.fmt(totalCobrado)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Clientes en mora</div>
          <div class="stat-value" style="color:var(--danger)">${conSaldo.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Clientes al día</div>
          <div class="stat-value" style="color:var(--success)">${clientes.length - conSaldo.length}</div>
        </div>
      </div>

      ${conSaldo.length === 0
        ? `<div class="card"><div class="empty-state"><div class="empty-icon">🎉</div><h3>Todo al día</h3><p>No hay saldos pendientes</p></div></div>`
        : `<div class="card">
            <div class="card-header">
              <div class="card-title">Clientes con saldo pendiente</div>
            </div>
            <div class="table-wrapper"><table>
              <thead><tr>
                <th>Cliente</th><th>Contacto</th><th>Total Compras</th><th>Saldo Pendiente</th><th>% Pagado</th><th></th>
              </tr></thead>
              <tbody>
                ${conSaldo.map(c => {
                  const saldo = Storage.getSaldoCliente(c.id);
                  const total = Storage.getTotalVentasCliente(c.id);
                  const pct   = total > 0 ? Math.round((total - saldo) / total * 100) : 0;
                  return `
                    <tr>
                      <td>
                        <div style="display:flex;align-items:center;gap:10px">
                          <div class="avatar">${(c.nombre[0]||'?').toUpperCase()}</div>
                          <div style="font-weight:600">${c.nombre}</div>
                        </div>
                      </td>
                      <td style="font-size:13px">
                        ${c.telefono||''} ${c.redSocial?`<span style="color:var(--primary)">@${c.redSocial}</span>`:''}
                      </td>
                      <td>${Storage.fmt(total)}</td>
                      <td><strong style="color:var(--danger)">${Storage.fmt(saldo)}</strong></td>
                      <td style="min-width:120px">
                        <div style="font-size:12px;margin-bottom:3px">${pct}% pagado</div>
                        <div class="deuda-bar">
                          <div class="deuda-fill" style="width:${pct}%"></div>
                        </div>
                      </td>
                      <td>
                        <button class="btn btn-success btn-sm" onclick="Cartera.openAbonoCliente('${c.id}')">💵 Abonar</button>
                      </td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table></div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">Últimos abonos registrados</div>
            </div>
            ${this._renderAbonos()}
          </div>`}
    `;
  },

  _renderAbonos() {
    const abonos = Storage.getAbonos()
      .sort((a, b) => new Date(b.fecha) - new Date(a.fecha))
      .slice(0, 20);

    if (!abonos.length) return `<p style="color:var(--text-secondary);font-size:13px">Sin abonos registrados</p>`;

    return `<div class="table-wrapper"><table>
      <thead><tr><th>Fecha</th><th>Cliente</th><th>Monto</th><th>Notas</th></tr></thead>
      <tbody>
        ${abonos.map(a => {
          const c = Storage.getCliente(a.clienteId);
          return `
            <tr>
              <td>${Storage.fmtDate(a.fecha)}</td>
              <td>${c?.nombre || '-'}</td>
              <td><strong style="color:var(--success)">${Storage.fmt(a.monto)}</strong></td>
              <td style="color:var(--text-secondary)">${a.notas || '-'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  },

  exportar(filtro, desde, hasta) {
    const clientes = Storage.getClientes();
    let rows = [];

    if (filtro === 'fecha') {
      const ventasRango = Storage.getVentas().filter(v => v.fecha >= desde && v.fecha <= hasta);
      const saldosCli = {}, totalCli = {}, ventasCli = {};
      ventasRango.forEach(v => {
        const s = Storage.getSaldoVenta(v.id);
        if (!saldosCli[v.clienteId]) { saldosCli[v.clienteId] = 0; totalCli[v.clienteId] = 0; ventasCli[v.clienteId] = []; }
        saldosCli[v.clienteId] += s;
        totalCli[v.clienteId]  += parseFloat(v.total || 0);
        ventasCli[v.clienteId].push(Storage.fmtDate(v.fecha));
      });
      rows = Object.keys(saldosCli)
        .filter(cid => saldosCli[cid] > 0)
        .map(cid => {
          const c = Storage.getCliente(cid);
          return {
            'Cliente':              c?.nombre || cid,
            'Teléfono':             c?.telefono || '',
            'Red Social':           c?.redSocial ? '@' + c.redSocial : '',
            'Ciudad':               c?.ciudad || '',
            'Total Ventas (rango)': totalCli[cid],
            'Saldo Pendiente':      saldosCli[cid],
            'Fechas de ventas':     ventasCli[cid].join(', ')
          };
        });
    } else {
      rows = clientes
        .filter(c => filtro === 'mora' ? Storage.getSaldoCliente(c.id) > 0 : true)
        .map(c => ({
          'Cliente':         c.nombre,
          'Teléfono':        c.telefono    || '',
          'Red Social':      c.redSocial   ? '@' + c.redSocial : '',
          'Ciudad':          c.ciudad      || '',
          'Total Compras':   Storage.getTotalVentasCliente(c.id),
          'Saldo Pendiente': Storage.getSaldoCliente(c.id)
        }));
    }

    if (!rows.length) { App.toast('Sin datos para exportar', 'warning'); return; }

    const ws = XLSX.utils.json_to_sheet(rows);
    // Ajustar ancho de columnas automáticamente
    const cols = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length, 14) }));
    ws['!cols'] = cols;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cartera');
    const nombre = filtro === 'fecha'
      ? `cartera_${desde}_al_${hasta}`
      : `cartera_${filtro}_${Storage.today()}`;
    XLSX.writeFile(wb, `${nombre}.xlsx`);
    App.toast(`${rows.length} registros exportados`, 'success');
  },

  _exportFecha() {
    const hoy      = Storage.today();
    const inicioMes = hoy.substr(0, 7) + '-01';
    App.openModal('📅 Exportar cartera por rango de fechas', `
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.6">
        Se exportarán los clientes con saldo pendiente de ventas realizadas en el período seleccionado.
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>Desde</label>
          <input class="form-control" id="exp-desde" type="date" value="${inicioMes}">
        </div>
        <div class="form-group">
          <label>Hasta</label>
          <input class="form-control" id="exp-hasta" type="date" value="${hoy}">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="
          const d=document.getElementById('exp-desde').value;
          const h=document.getElementById('exp-hasta').value;
          if(!d||!h){App.toast('Selecciona ambas fechas','warning');return;}
          App.closeModal();
          Cartera.exportar('fecha',d,h);
        ">⬇️ Exportar Excel</button>
      </div>`);
  },

  openAbonoCliente(clienteId) {
    const c = Storage.getCliente(clienteId);
    const ventas = Storage.getVentas()
      .filter(v => v.clienteId === clienteId && Storage.getSaldoVenta(v.id) > 0)
      .sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
    const saldoTotal = Storage.getSaldoCliente(clienteId);

    App.openModal(`💵 Abono — ${c?.nombre}`, `
      <div style="background:#fff3f3;border:1px solid var(--danger);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;color:var(--danger)">Saldo total pendiente</span>
        <span style="font-size:20px;font-weight:700;color:var(--danger)">${Storage.fmt(saldoTotal)}</span>
      </div>

      <div class="form-group">
        <label>Aplicar abono a la venta</label>
        <select class="form-control" id="ab-venta">
          ${ventas.map(v => `<option value="${v.id}">
            ${Storage.fmtDate(v.fecha)} — Saldo: ${Storage.fmt(Storage.getSaldoVenta(v.id))}
          </option>`).join('')}
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Monto *</label>
          <input class="form-control" id="ab-monto" type="number" step="0.01" min="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input class="form-control" id="ab-fecha" type="date" value="${Storage.today()}">
        </div>
      </div>

      <div class="form-group">
        <label>Forma de pago / Notas</label>
        <input class="form-control" id="ab-notas" placeholder="Efectivo, transferencia, Nequi...">
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>
        <button class="btn btn-success" onclick="Cartera.saveAbono('${clienteId}')">💾 Registrar Abono</button>
      </div>`);
  },

  saveAbono(clienteId) {
    const ventaId = document.getElementById('ab-venta')?.value;
    const monto   = parseFloat(document.getElementById('ab-monto')?.value);
    if (!ventaId) { App.toast('Selecciona la venta', 'error'); return; }
    if (!monto || monto <= 0) { App.toast('Ingresa un monto válido', 'error'); return; }
    const saldo = Storage.getSaldoVenta(ventaId);
    if (monto > saldo + 0.01) { App.toast(`El abono supera el saldo (${Storage.fmt(saldo)})`, 'warning'); return; }

    Storage.saveAbono({
      ventaId,
      clienteId,
      monto,
      fecha: document.getElementById('ab-fecha')?.value || Storage.today(),
      notas: document.getElementById('ab-notas')?.value.trim() || ''
    });

    App.closeModal();
    App.toast('Abono registrado', 'success');
    this.render();
  }
};


const Catalogo = {
  _seleccionados: new Set(),

  render() {
    const productos = Storage.getProductos().filter(p => p.estado !== 'agotado');
    const cfg = Storage.getConfig();
    this._seleccionados = new Set();

    document.getElementById('view-container').innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">📄 Catálogo PDF</h1>
          <p class="page-subtitle">Selecciona los productos y genera el catálogo</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="Catalogo.selTodos(true)">Seleccionar todos</button>
          <button class="btn btn-ghost" onclick="Catalogo.selTodos(false)">Deseleccionar</button>
          <button class="btn btn-primary" onclick="Catalogo.generarPDF()">📄 Generar PDF</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><div class="card-title">Opciones del catálogo</div></div>
        <div class="form-row-3">
          <div class="form-group">
            <label>Título del catálogo</label>
            <input class="form-control" id="cat-titulo" value="${cfg.nombreNegocio || 'Catálogo'} — ${new Date().toLocaleDateString('es')}">
          </div>
          <div class="form-group">
            <label>Subtítulo / Temporada</label>
            <input class="form-control" id="cat-subtitulo" placeholder="Ej: Colección Primavera 2025">
          </div>
          <div class="form-group">
            <label>Mostrar precios</label>
            <select class="form-control" id="cat-precios">
              <option value="si">Sí, mostrar precios</option>
              <option value="no">No mostrar precios</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div class="card-title">Productos disponibles</div>
          <span id="cat-count" style="font-size:13px;color:var(--text-secondary)">0 seleccionados</span>
        </div>
        <div class="toolbar">
          <input type="text" class="search-input" id="cat-q" placeholder="Buscar..." oninput="Catalogo.filter()">
          <select class="form-control" style="width:auto" id="cat-cat" onchange="Catalogo.filter()">
            <option value="">Todas las categorías</option>
            ${[...new Set(productos.map(p=>p.categoria).filter(Boolean))].map(c=>`<option>${c}</option>`).join('')}
          </select>
        </div>
        <div class="product-grid" id="cat-grid">
          ${this._renderGrid(productos)}
        </div>
      </div>`;
  },

  _renderGrid(productos) {
    if (!productos.length) return `<div class="empty-state"><div class="empty-icon">📦</div><h3>Sin productos</h3></div>`;
    return productos.map(p => `
      <div class="product-check-card ${this._seleccionados.has(p.id)?'selected':''}" onclick="Catalogo.toggle('${p.id}',this)" id="pcc-${p.id}">
        <div class="check-badge">✓</div>
        ${p.foto
          ? `<img src="${p.foto}" alt="${p.nombre}">`
          : `<div class="no-img">📦</div>`}
        <div style="font-size:12px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nombre}</div>
        <div style="font-size:11px;color:var(--text-secondary)">${p.categoria||''}</div>
        <div style="font-size:13px;font-weight:700;color:var(--primary);margin-top:4px">${Storage.fmt(p.precioVenta)}</div>
      </div>`).join('');
  },

  toggle(id, el) {
    if (this._seleccionados.has(id)) { this._seleccionados.delete(id); el.classList.remove('selected'); }
    else { this._seleccionados.add(id); el.classList.add('selected'); }
    const cnt = document.getElementById('cat-count');
    if (cnt) cnt.textContent = `${this._seleccionados.size} seleccionados`;
  },

  selTodos(sel) {
    const productos = Storage.getProductos().filter(p => p.estado !== 'agotado');
    this._seleccionados = sel ? new Set(productos.map(p=>p.id)) : new Set();
    document.querySelectorAll('.product-check-card').forEach(el => {
      const id = el.id.replace('pcc-','');
      el.classList.toggle('selected', this._seleccionados.has(id));
    });
    const cnt = document.getElementById('cat-count');
    if (cnt) cnt.textContent = `${this._seleccionados.size} seleccionados`;
  },

  filter() {
    const q   = (document.getElementById('cat-q')?.value   || '').toLowerCase();
    const cat = document.getElementById('cat-cat')?.value || '';
    let p = Storage.getProductos().filter(x => x.estado !== 'agotado');
    if (q)   p = p.filter(x => `${x.nombre}${x.categoria}`.toLowerCase().includes(q));
    if (cat) p = p.filter(x => x.categoria === cat);
    const grid = document.getElementById('cat-grid');
    if (grid) grid.innerHTML = this._renderGrid(p);
  },

  generarPDF() {
    if (!this._seleccionados.size) { App.toast('Selecciona al menos un producto', 'warning'); return; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const cfg     = Storage.getConfig();
    const titulo  = document.getElementById('cat-titulo')?.value   || cfg.nombreNegocio;
    const subtit  = document.getElementById('cat-subtitulo')?.value|| '';
    const mostrarPrecios = document.getElementById('cat-precios')?.value !== 'no';
    const productos = Storage.getProductos().filter(p => this._seleccionados.has(p.id));

    const W = 210, H = 297;
    const margin  = 14;
    const cols    = 3;
    const colW    = (W - margin * 2) / cols;
    const imgH    = 42;
    const cardH   = imgH + (mostrarPrecios ? 22 : 16);
    const gap     = 6;
    const headerH = cfg.logo ? 36 : 28;

    // Color del catálogo (configurable)
    const hex  = cfg.catalogColor || '#ec4899';
    const cr   = parseInt(hex.slice(1, 3), 16);
    const cg   = parseInt(hex.slice(3, 5), 16);
    const cb   = parseInt(hex.slice(5, 7), 16);

    // ── Header ──
    doc.setFillColor(cr, cg, cb);
    doc.rect(0, 0, W, headerH, 'F');

    // Logo (si existe) — lado izquierdo del header
    const logoSize = 24;
    const logoY    = (headerH - logoSize) / 2;
    if (cfg.logo) {
      try {
        const fmt = cfg.logo.startsWith('data:image/png') ? 'PNG' : 'JPEG';
        doc.addImage(cfg.logo, fmt, margin, logoY, logoSize, logoSize, undefined, 'FAST');
      } catch {}
    }

    // Título — centrado o desplazado si hay logo
    const textX     = cfg.logo ? margin + logoSize + 6 : W / 2;
    const textAlign = cfg.logo ? 'left' : 'center';
    const titleY    = subtit ? headerH / 2 - 1 : headerH / 2 + 4;
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(cfg.logo ? 15 : 18);
    doc.setFont('helvetica', 'bold');
    doc.text(titulo, textX, titleY, { align: textAlign });
    if (subtit) {
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text(subtit, textX, titleY + 8, { align: textAlign });
    }

    let x = margin, y = headerH + 6;
    let col = 0;

    productos.forEach((p, idx) => {
      // Nueva página si no cabe
      if (y + cardH > H - margin) {
        doc.addPage();
        y = margin;
        x = margin;
        col = 0;
      }

      // Fondo tarjeta
      doc.setFillColor(248, 250, 252);
      doc.roundedRect(x, y, colW - gap, cardH, 3, 3, 'F');

      // Imagen
      if (p.foto) {
        try { doc.addImage(p.foto, 'JPEG', x + 2, y + 2, colW - gap - 4, imgH - 4, undefined, 'FAST'); }
        catch {}
      } else {
        doc.setFillColor(226, 232, 240);
        doc.rect(x + 2, y + 2, colW - gap - 4, imgH - 4, 'F');
        doc.setTextColor(100, 116, 139);
        doc.setFontSize(8);
        doc.text('Sin foto', x + colW / 2 - gap / 2, y + imgH / 2 + 2, { align: 'center' });
      }

      // Nombre
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      const lines = doc.splitTextToSize(p.nombre, colW - gap - 4);
      doc.text(lines.slice(0, 2), x + 2, y + imgH + 5);

      // Precio
      if (mostrarPrecios) {
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(cr, cg, cb);
        doc.text(Storage.fmt(p.precioVenta), x + 2, y + imgH + 14);
      }

      col++;
      if (col >= cols) { col = 0; x = margin; y += cardH + gap; }
      else { x += colW; }
    });

    // Footer
    const pages = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pages; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setTextColor(148, 163, 184);
      doc.setFont('helvetica', 'normal');
      doc.text(`${cfg.nombreNegocio || ''} — Página ${i} de ${pages}`, W / 2, H - 6, { align: 'center' });
    }

    const fname = `catalogo_${(titulo).replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Storage.today()}.pdf`;
    doc.save(fname);
    App.toast('PDF generado correctamente', 'success');
  }
};


const Reportes = {
  render() {
    const ventas    = Storage.getVentas();
    const productos = Storage.getProductos();
    const abonos    = Storage.getAbonos();
    const imports   = Storage.getImportaciones();

    const totalVentas   = ventas.reduce((s,v)=>s+parseFloat(v.total||0),0);
    const totalInversion= imports.reduce((s,p)=>s+(parseFloat(p.valorAmazon||0)+parseFloat(p.valorCourier||0)),0);
    const totalCobrado  = ventas.reduce((s,v)=>s+parseFloat(v.pagadoInicial||0),0)
                        + abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0);
    const totalCartera  = ventas.reduce((s,v)=>s+Storage.getSaldoVenta(v.id),0);

    // Ganancia = precio venta - costo de los productos vendidos
    let ganancia = 0;
    ventas.forEach(v => {
      (v.items||[]).forEach(item => {
        const p = Storage.getProducto(item.productoId);
        const costo = p ? parseFloat(p.inversionTotal||0) : 0;
        ganancia += (parseFloat(item.precioUnitario||0) - costo) * (parseInt(item.cantidad)||1);
      });
    });

    document.getElementById('view-container').innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">📊 Reportes</h1>
          <p class="page-subtitle">Resumen general del negocio</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <select class="form-control" style="width:auto" id="rep-periodo" onchange="Reportes._refrescar()">
            <option value="todo">Todo el tiempo</option>
            <option value="mes">Este mes</option>
            <option value="3m">Últimos 3 meses</option>
          </select>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card" style="border-left:4px solid var(--primary)">
          <div class="stat-label">Total Ventas</div>
          <div class="stat-value" style="font-size:20px">${Storage.fmt(totalVentas)}</div>
          <div class="stat-sub">${ventas.length} transacciones</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--success)">
          <div class="stat-label">Ganancia Bruta</div>
          <div class="stat-value" style="font-size:20px;color:var(--success)">${Storage.fmt(ganancia)}</div>
          <div class="stat-sub">${totalVentas > 0 ? (ganancia/totalVentas*100).toFixed(1) : 0}% margen</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--warning)">
          <div class="stat-label">Inversión Importaciones</div>
          <div class="stat-value" style="font-size:20px;color:var(--warning)">${Storage.fmt(totalInversion)}</div>
          <div class="stat-sub">${imports.length} importaciones</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--danger)">
          <div class="stat-label">Cartera Pendiente</div>
          <div class="stat-value" style="font-size:20px;color:var(--danger)">${Storage.fmt(totalCartera)}</div>
          <div class="stat-sub">${Storage.fmt(totalCobrado)} cobrado</div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">Ventas por mes</div>
          <canvas id="chart-ventas-mes"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Inversión vs Ventas</div>
          <canvas id="chart-inv-vs-venta"></canvas>
        </div>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">Productos más vendidos</div>
          <canvas id="chart-top-prod"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Clientes con más compras</div>
          <canvas id="chart-top-cli"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Estado del inventario por categoría</div></div>
        <div id="rep-inv-cat"></div>
      </div>`;

    this._buildCharts(ventas, productos, imports);
    this._buildInvCat(productos);
  },

  _buildCharts(ventas, productos, imports) {
    // 1. Ventas por mes
    const meses = {};
    ventas.forEach(v => {
      const m = (v.fecha || '').substr(0, 7);
      if (m) meses[m] = (meses[m] || 0) + parseFloat(v.total || 0);
    });
    const mesesKeys = Object.keys(meses).sort().slice(-12);
    const c1 = new Chart(document.getElementById('chart-ventas-mes'), {
      type: 'bar',
      data: {
        labels: mesesKeys.map(m => { const [y,mo]=m.split('-'); return `${mo}/${y.substr(2)}`; }),
        datasets: [{ label: 'Ventas', data: mesesKeys.map(k=>meses[k]), backgroundColor: '#6366f1', borderRadius: 6 }]
      },
      options: { responsive:true, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true } } }
    });
    App.registerChart(c1);

    // 2. Inversión vs Ventas (donut)
    const totalVentas = ventas.reduce((s,v)=>s+parseFloat(v.total||0),0);
    const totalCobrado = ventas.reduce((s,v)=>s+parseFloat(v.pagadoInicial||0),0)
                       + Storage.getAbonos().reduce((s,a)=>s+parseFloat(a.monto||0),0);
    const totalCartera = totalVentas - totalCobrado;
    const totalInv = imports.reduce((s,p)=>s+(parseFloat(p.valorAmazon||0)+parseFloat(p.valorCourier||0)),0);
    const c2 = new Chart(document.getElementById('chart-inv-vs-venta'), {
      type: 'doughnut',
      data: {
        labels: ['Cobrado', 'Cartera', 'Inversión'],
        datasets: [{ data: [totalCobrado, totalCartera, totalInv],
          backgroundColor: ['#10b981','#ef4444','#f59e0b'], borderWidth: 0 }]
      },
      options: { responsive:true, plugins:{ legend:{ position:'bottom' } }, cutout:'60%' }
    });
    App.registerChart(c2);

    // 3. Top productos vendidos
    const prodVentas = {};
    ventas.forEach(v => (v.items||[]).forEach(i => {
      prodVentas[i.nombre] = (prodVentas[i.nombre]||0) + (i.cantidad||1);
    }));
    const topProds = Object.entries(prodVentas).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const c3 = new Chart(document.getElementById('chart-top-prod'), {
      type: 'bar',
      data: {
        labels: topProds.map(([n])=>n.length>18?n.substr(0,18)+'…':n),
        datasets: [{ label:'Unidades', data: topProds.map(([,v])=>v), backgroundColor:'#10b981', borderRadius:6 }]
      },
      options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
    });
    App.registerChart(c3);

    // 4. Top clientes
    const cliVentas = {};
    ventas.forEach(v => {
      cliVentas[v.clienteNombre||'Sin nombre'] = (cliVentas[v.clienteNombre||'Sin nombre']||0) + parseFloat(v.total||0);
    });
    const topCli = Object.entries(cliVentas).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const c4 = new Chart(document.getElementById('chart-top-cli'), {
      type: 'bar',
      data: {
        labels: topCli.map(([n])=>n.length>16?n.substr(0,16)+'…':n),
        datasets: [{ label:'Compras', data: topCli.map(([,v])=>v), backgroundColor:'#6366f1', borderRadius:6 }]
      },
      options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
    });
    App.registerChart(c4);
  },

  _buildInvCat(productos) {
    const cats = {};
    productos.forEach(p => {
      const c = p.categoria || 'Sin categoría';
      if (!cats[c]) cats[c] = { total:0, disponibles:0, inversionStock:0 };
      cats[c].total++;
      if (p.estado === 'disponible') cats[c].disponibles++;
      cats[c].inversionStock += (parseFloat(p.inversionTotal)||0) * (parseInt(p.stock)||0);
    });

    const el = document.getElementById('rep-inv-cat');
    if (!el) return;
    if (!Object.keys(cats).length) { el.innerHTML = `<p style="color:var(--text-secondary);font-size:13px">Sin datos</p>`; return; }

    el.innerHTML = `<div class="table-wrapper"><table>
      <thead><tr><th>Categoría</th><th>Productos</th><th>Disponibles</th><th>Inversión en Stock</th></tr></thead>
      <tbody>
        ${Object.entries(cats).sort((a,b)=>b[1].total-a[1].total).map(([cat,d])=>`
          <tr>
            <td style="font-weight:600">${cat}</td>
            <td>${d.total}</td>
            <td><span style="color:var(--success);font-weight:700">${d.disponibles}</span></td>
            <td>${Storage.fmt(d.inversionStock)}</td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
  },

  _refrescar() { this.render(); }
};

  _previewLogo(inp) {
    const file = inp.files[0];

    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 300;
        let [w, h] = [img.width, img.height];
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h*max/w); w = max; }
          else       { w = Math.round(w*max/h); h = max; }
        }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        window._logoActual = canvas.toDataURL('image/png', 0.8);
        document.getElementById('cfg-logo-wrap').innerHTML =
          `<img src="${window._logoActual}" style="max-height:80px;border-radius:8px" id="cfg-logo-prev">`;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },

    const nombre = await Storage.selectFolder();
    if (nombre) {
      App.toast(`Carpeta "${nombre}" vinculada. Los datos se guardarán ahí.`, 'success');
      App.updateSyncBtn();
      this.render();
    }
  },

  async _desconectarCarpeta() {
    App.confirm('¿Desconectar la carpeta? Los datos seguirán en localStorage pero no se guardarán en archivos.', async () => {
      await Storage.disconnectFolder();
      App.toast('Carpeta desconectada. Usando localStorage.', 'info');
      App.updateSyncBtn();
      this.render();
    });
  },

  borrarModulo(modulo) {
    const labels = { ventas:'ventas y abonos', productos:'productos' };
    App.confirm(`¿Eliminar todos los ${labels[modulo]||modulo}? Esta acción no se puede deshacer.`, () => {
      if (modulo === 'ventas') {
        Storage._set(Storage.K.VENTAS, []);
        Storage._set(Storage.K.ABONOS, []);
      } else if (modulo === 'productos') {
        Storage._set(Storage.K.PRODUCTOS, []);
      }
      App.toast(`${labels[modulo]||modulo} eliminados`, 'success');
      this.render();
    });
  },

  borrarTodo() {
    App.confirm('⚠️ Se eliminarán TODOS los datos: productos, importaciones, clientes, ventas, abonos y configuración. ¿Continuar?', () => {
      Object.values(Storage.K).forEach(k => localStorage.removeItem(k));
      App.toast('Datos eliminados', 'success');
      App.navigate('inventario');
    });
  },

  // ── GitHub ──────────────────────────────────────────────────────────────────
  async _testGitHub() {
    const owner = document.getElementById('cfg-gh-owner')?.value.trim();
    const repo  = document.getElementById('cfg-gh-repo')?.value.trim();
    const token = document.getElementById('cfg-gh-token')?.value.trim();
    if (!owner || !repo || !token) {
      App.toast('Completa usuario, repositorio y token antes de probar', 'warning');
      return;
    }
    try {
      const info = await GitHub.testConnection(owner, repo, token);
      App.toast(`✅ Conectado a ${info.name} (${info.private ? 'privado' : 'público'})`, 'success');
    } catch(e) {
      App.toast(`Error: ${e.message}`, 'error');
    }
  },

  _saveGitHub() {
    const owner  = document.getElementById('cfg-gh-owner')?.value.trim();
    const repo   = document.getElementById('cfg-gh-repo')?.value.trim();
    const branch = document.getElementById('cfg-gh-branch')?.value.trim() || 'main';
    const token  = document.getElementById('cfg-gh-token')?.value.trim();
    if (!owner || !repo || !token) {
      App.toast('Completa usuario, repositorio y token', 'warning');
      return;
    }
    GitHub.saveConfig({ owner, repo, branch, token });
    App.toast('Configuración GitHub guardada', 'success');
    App.updateSyncBtn();
    this.render();
  },

  _desconectarGitHub() {
    App.confirm('¿Desconectar GitHub? Los datos en el repositorio no se borran.', () => {
      GitHub.saveConfig({});
      App.toast('GitHub desconectado', 'info');
      App.updateSyncBtn();
      this.render();
    });
  },

  async _pushGitHub() {
    App.confirm('¿Subir todos los datos a GitHub? Sobreescribirá los archivos del repositorio.', async () => {
      App.toast('Subiendo datos a GitHub...', 'info');
      try {
        await GitHub.syncAll();
        App.toast('Datos subidos a GitHub correctamente ✅', 'success');
      } catch(e) {
        App.toast('Error al subir: ' + e.message, 'error');
      }
    });
  },

  async _pullGitHub() {
    App.confirm('¿Bajar datos de GitHub? Los datos locales serán reemplazados (las imágenes se conservan).', async () => {
      App.toast('Descargando datos de GitHub...', 'info');
      try {
        await GitHub.pullAll();
        App.toast('Datos descargados de GitHub correctamente ✅', 'success');
        App.reloadConfig();
        this.render();
      } catch(e) {
        App.toast('Error al bajar: ' + e.message, 'error');
      }
    });
  }
};


const App = {
  views: {
    inventario:    () => Inventario.render(),
    importaciones: () => Importaciones.render(),
    clientes:      () => Clientes.render(),
    ventas:        () => Ventas.render(),
    cartera:       () => Cartera.render(),
    catalogo:      () => Catalogo.render(),
    reportes:      () => Reportes.render(),
    config:        () => Config.render()
  },
  _charts: [],

  async init() {
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        this.navigate(link.dataset.view);
      });
    });

    const splash = msg =>
      document.getElementById('view-container').innerHTML =
        `<div style="padding:60px;text-align:center;color:var(--text-secondary);font-size:14px">${msg}</div>`;

    splash('Cargando datos...');
    await Storage.initStorage();

    if (GitHub.isConfigured()) {
      splash('⬇️ Sincronizando con GitHub...');
      try {
        await GitHub.pullAll();
      } catch(e) {
        this.toast('Sin conexión a GitHub. Usando datos locales.', 'warning');
      }
    }

    this._applyConfig();
    this.updateSyncBtn();

    const hash = location.hash.replace('#', '');
    this.navigate(this.views[hash] ? hash : 'inventario');
  },

  navigate(view) {
    if (!this.views[view]) view = 'inventario';

    // Destroy existing Chart.js instances
    this._charts.forEach(c => { try { c.destroy(); } catch {} });
    this._charts = [];

    document.querySelectorAll('.nav-link').forEach(l =>
      l.classList.toggle('active', l.dataset.view === view));

    location.hash = view;
    document.getElementById('view-container').innerHTML = '';
    this.views[view]();
  },

  registerChart(instance) { this._charts.push(instance); },

  _applyConfig() {
    const cfg = Storage.getConfig();
    const el = document.getElementById('sidebar-title');
    if (el) el.textContent = cfg.nombreNegocio || 'ImportApp';
    if (cfg.logo) {
      const wrap = document.getElementById('sidebar-logo-wrap');
      const img  = document.getElementById('sidebar-logo');
      if (wrap && img) { img.src = cfg.logo; wrap.style.display = 'block'; }
    }
  },

  reloadConfig() { this._applyConfig(); },

  async syncData() {
    const btn  = document.getElementById('sync-btn');
    const icon = btn?.querySelector('.sync-icon');
    const lbl  = btn?.querySelector('.sync-label');
    if (!btn) return;

    const hasFolder = !!Storage.getFolderName();
    const hasGitHub = GitHub.isConfigured();

    if (!hasFolder && !hasGitHub) {
      App.toast('Configura una carpeta o GitHub en Configuración', 'warning');
      App.navigate('config');
      return;
    }

    btn.disabled = true;
    if (icon) icon.textContent = '⏳';
    if (lbl)  lbl.textContent  = 'Guardando...';

    const destinos = [];
    let hayError = false;

    if (hasFolder) {
      const result = await Storage.syncAll();
      if (result.ok) destinos.push('carpeta');
      else { hayError = true; App.toast('Error al guardar en carpeta local', 'error'); }
    }

    if (hasGitHub) {
      try {
        await GitHub.syncAll();
        destinos.push('GitHub');
      } catch(e) {
        hayError = true;
        App.toast('Error GitHub: ' + e.message, 'error');
      }
    }

    if (destinos.length) {
      btn.className = 'sync-btn sync-ok';
      if (icon) icon.textContent = '✅';
      if (lbl)  lbl.textContent  = 'Guardado';
      App.toast('Guardado en: ' + destinos.join(' y '), 'success');
      setTimeout(() => { btn.disabled = false; App.updateSyncBtn(); }, 2000);
    } else {
      if (icon) icon.textContent = '⚠️';
      if (lbl)  lbl.textContent  = 'Error';
      btn.disabled = false;
      setTimeout(() => App.updateSyncBtn(), 3000);
    }
  },

  updateSyncBtn() {
    const btn    = document.getElementById('sync-btn');
    const status = document.getElementById('sync-status');
    if (!btn) return;

    const folder = Storage.getFolderName();
    const ghCfg  = GitHub.isConfigured() ? GitHub.getConfig() : null;
    btn.disabled = false;
    const icon = btn.querySelector('.sync-icon');
    const lbl  = btn.querySelector('.sync-label');

    if (folder || ghCfg) {
      btn.className = 'sync-btn sync-active';
      if (icon) icon.textContent = '💾';
      if (lbl)  lbl.textContent  = 'Sincronizar';
      if (status) {
        const parts = [];
        if (folder) parts.push(`📁 ${folder}`);
        if (ghCfg)  parts.push(`🐙 ${ghCfg.owner}/${ghCfg.repo}`);
        status.textContent = parts.join(' · ');
      }
    } else {
      btn.className = 'sync-btn sync-inactive';
      if (icon) icon.textContent = '💾';
      if (lbl)  lbl.textContent  = 'Sin sincronizar';
      if (status) status.textContent = 'Configurar en ⚙️';
    }
  },

  // ── Modal ──
  openModal(title, bodyHtml, large = false) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('modal').className = 'modal' + (large ? ' modal-lg' : '');
    document.getElementById('modal-overlay').style.display = 'flex';
  },

  closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('modal-body').innerHTML = '';
  },

  // ── Toast ──
  toast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3200);
  },

  // ── Confirm dialog ──
  confirm(msg, cb) {
    const html = `
      <p style="margin-bottom:20px;color:#475569;line-height:1.6">${msg}</p>
      <div class="modal-footer" style="padding:0">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancelar</button>
        <button class="btn btn-danger" id="confirm-yes">Confirmar</button>
      </div>`;
    this.openModal('¿Estás seguro?', html);
    document.getElementById('confirm-yes').onclick = () => { this.closeModal(); cb(); };
  }
};

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') App.closeModal();
});

document.addEventListener('DOMContentLoaded', () => App.init());

</script>
</body>
</html>
